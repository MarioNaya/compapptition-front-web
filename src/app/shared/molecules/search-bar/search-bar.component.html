<div class="search-bar">
  <div class="input-wrap">
    <app-icon name="search" [size]="16" class="lead-icon" />
    <input
      class="input"
      type="text"
      [placeholder]="placeholder()"
      [ngModel]="value()"
      (ngModelChange)="onInput($event)"
    />
  </div>
  @if (showFilter()) {
    <button class="filter-btn" (click)="clickFilter()" type="button">
      <app-icon name="filter" [size]="16" />
    </button>
  }
</div>
