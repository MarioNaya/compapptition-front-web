@if (rounds().length === 0) {
  <p class="bracket-empty">El calendario del playoff aún no se ha generado.</p>
} @else {
  <div class="bracket-wrap">
    <div class="round-labels" [style.width.px]="layout().width">
      @for (r of rounds(); track $index) {
        <div class="round-label">
          {{ roundLabel($index, rounds().length) }}
          <span class="count">{{ r.length }}</span>
        </div>
      }
    </div>

    <div class="svg-scroll">
      <svg
        class="bracket"
        [attr.width]="layout().width"
        [attr.height]="layout().height"
        [attr.viewBox]="'0 0 ' + layout().width + ' ' + layout().height"
      >
        @for (edge of layout().edges; track edge.from + '-' + edge.to) {
          <path class="edge" [attr.d]="edge.d" />
        }

        @for (n of layout().nodes; track n.data.id) {
          <g
            class="node"
            [class.finalized]="n.data.state === 'finalized'"
            [class.live]="n.data.state === 'live'"
            [class.pending]="n.data.state === 'pending'"
            [class.placeholder]="n.data.state === 'placeholder'"
            [class.clickable]="n.data.realEvento"
            [attr.transform]="'translate(' + n.x + ',' + n.y + ')'"
            (click)="onClick(n.data)"
            [attr.tabindex]="n.data.realEvento ? 0 : -1"
            (keydown.enter)="onClick(n.data)"
          >
            <rect class="node-bg" [attr.width]="nodeW" [attr.height]="nodeH" rx="8" />

            <g class="team-row home" [class.winner]="winnerSide(n.data) === 'home'">
              <text class="team-name" x="12" y="26">{{ n.data.homeLabel }}</text>
              <text class="team-score" [attr.x]="nodeW - 14" y="26">
                {{ n.data.homeScore ?? (n.data.state === 'placeholder' ? '' : '—') }}
              </text>
            </g>

            <line class="divider" x1="0" [attr.y1]="nodeH / 2" [attr.x2]="nodeW" [attr.y2]="nodeH / 2" />

            <g class="team-row away" [class.winner]="winnerSide(n.data) === 'away'">
              <text class="team-name" x="12" y="60">{{ n.data.awayLabel }}</text>
              <text class="team-score" [attr.x]="nodeW - 14" y="60">
                {{ n.data.awayScore ?? (n.data.state === 'placeholder' ? '' : '—') }}
              </text>
            </g>
          </g>
        }
      </svg>
    </div>
  </div>
}
