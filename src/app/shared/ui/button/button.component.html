<button
  class="btn"
  [class.btn-primary]="variant() === 'primary'"
  [class.btn-ghost]="variant() === 'ghost'"
  [class.btn-orange-ghost]="variant() === 'orange-ghost'"
  [class.btn-block]="fullWidth()"
  [attr.type]="type()"
  [disabled]="disabled()"
  (click)="onClick($event)"
>
  <ng-content />
</button>
