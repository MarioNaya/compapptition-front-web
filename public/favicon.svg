<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1513"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa340"/>
      <stop offset="100%" stop-color="#ff7a1a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <g fill="none" stroke="url(#trophy)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bowl: top wide, sides slightly slanted, rounded bottom -->
    <path d="M19 11 H45 V26 Q45 36 32 36 Q19 36 19 26 Z"/>
    <!-- Left handle -->
    <path d="M19 14 H11 v6 a7 7 0 0 0 8 7"/>
    <!-- Right handle -->
    <path d="M45 14 h8 v6 a7 7 0 0 1 -8 7"/>
    <!-- Stem -->
    <path d="M32 36 V44"/>
    <!-- Plate above pedestal -->
    <path d="M24 44 H40"/>
    <!-- Pedestal: trapezoid base, wider abajo -->
    <path d="M26 44 L20 54 H44 L38 44 Z"/>
  </g>
</svg>
